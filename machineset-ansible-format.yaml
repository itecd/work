- name: Create MachineSet in OpenShift (Azure)
  hosts: localhost
  gather_facts: false
  vars:
    cluster_id: mycluster-abc12
    region: eastus
    resource_group: mycluster-abc12-rg
    network_rg: mycluster-abc12-rg
    vnet: mycluster-abc12-vnet
    subnet: mycluster-abc12-worker-subnet

  tasks:
    - name: Apply MachineSet
      kubernetes.core.k8s:
        state: present
        kubeconfig: ~/.kube/config
        definition:
          apiVersion: machine.openshift.io/v1beta1
          kind: MachineSet
          metadata:
            name: "{{ cluster_id }}-worker-eastus1"
            namespace: openshift-machine-api
            labels:
              machine.openshift.io/cluster-api-cluster: "{{ cluster_id }}"
          spec:
            replicas: 2
            selector:
              matchLabels:
                machine.openshift.io/cluster-api-cluster: "{{ cluster_id }}"
                machine.openshift.io/cluster-api-machineset: "{{ cluster_id }}-worker-eastus1"
            template:
              metadata:
                labels:
                  machine.openshift.io/cluster-api-cluster: "{{ cluster_id }}"
                  machine.openshift.io/cluster-api-machineset: "{{ cluster_id }}-worker-eastus1"
              spec:
                providerSpec:
                  value:
                    apiVersion: azureproviderconfig.openshift.io/v1beta1
                    kind: AzureMachineProviderSpec
                    location: "{{ region }}"
                    vmSize: Standard_D4s_v5
                    zone: "1"

                    resourceGroup: "{{ resource_group }}"
                    networkResourceGroup: "{{ network_rg }}"
                    vnet: "{{ vnet }}"
                    subnet: "{{ subnet }}"

                    osDisk:
                      osType: Linux
                      diskSizeGB: 128
                      managedDisk:
                        storageAccountType: Premium_LRS

                    image:
                      publisher: azureopenshift
                      offer: aro4
                      sku: aro_417
                      version: latest

                    userDataSecret:
                      name: worker-user-data

                    credentialsSecret:
                      name: azure-cloud-credentials
                      namespace: openshift-machine-api

                    publicIP: false
                    acceleratedNetworking: true

                    tags:
                      environment: production
                      owner: platform-team
