apiVersion: machine.openshift.io/v1beta1
kind: MachineSet
metadata:
  name: example-machineset
  namespace: openshift-machine-api
  labels:
    machine.openshift.io/cluster-api-cluster: <cluster-id>
spec:
  replicas: 2
  selector:
    matchLabels:
      machine.openshift.io/cluster-api-cluster: <cluster-id>
      machine.openshift.io/cluster-api-machineset: example-machineset
  template:
    metadata:
      labels:
        machine.openshift.io/cluster-api-cluster: <cluster-id>
        machine.openshift.io/cluster-api-machineset: example-machineset
    spec:
      providerSpec:
        value:
          apiVersion: azureproviderconfig.openshift.io/v1beta1
          kind: AzureMachineProviderSpec
          location: <azure-region>                # e.g. eastus
          vmSize: Standard_D4s_v5
          zone: "1"
          osDisk:
            osType: Linux
            diskSizeGB: 128
            managedDisk:
              storageAccountType: Premium_LRS
          networkResourceGroup: <network-rg>
          vnet: <vnet-name>
          subnet: <subnet-name>
          publicIP: false
          resourceGroup: <machine-rg>
          credentialsSecret:
            name: azure-cloud-credentials
            namespace: openshift-machine-api
          userDataSecret:
            name: worker-user-data
          image:
            resourceID: /subscriptions/<sub-id>/resourceGroups/<rg>/providers/Microsoft.Compute/images/<image-name>

          # 👇 THIS IS WHAT YOU WANT
          tags:
            environment: production
            owner: platform-team
            cost-center: "12345"
            workload: openshift-worker

          # Optional but common
          acceleratedNetworking: true
          diagnostics:
            boot:
              storageAccountType: Managed
